services:
  jekyll:
    image: jekyll/jekyll:pages
    command: jekyll serve --watch --force_polling --livereload
    ports:
      - "4000:4000"
      - "35729:35729" # For LiveReload
    volumes:
      - .:/srv/jekyll
      - jekyll_gems:/usr/local/bundle
    environment:
      - JEKYLL_ENV=development

volumes:
  jekyll_gems:
