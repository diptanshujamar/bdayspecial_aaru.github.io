<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 19: The Snapchat Deactivation</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; min-height: 100vh; overflow: hidden; background: linear-gradient(135deg, #FFFC00, #ffb142); color: #2d3436; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 2s ease, filter 2s ease, color 2s ease; }
        
        /* When the deactivation drops, everything turns dark and sad */
        body.ruined-mode { background: linear-gradient(135deg, #1e272e, #000000); color: #fff; filter: brightness(0.8) grayscale(0.5); }
        body.glitch-mode { animation: screenGlitch 0.2s cubic-bezier(.25, .46, .45, .94) both 3; }

        @keyframes screenGlitch {
            0% { transform: translate(0) }
            20% { transform: translate(-5px, 5px) }
            40% { transform: translate(-5px, -5px) }
            60% { transform: translate(5px, 5px) }
            80% { transform: translate(5px, -5px) }
            100% { transform: translate(0) }
        }

        #page-entrance-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; z-index: 9999999; animation: fadeOutWhite 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        @keyframes fadeOutWhite { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        .story-container { width: 90%; max-width: 800px; height: 75vh; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 10; perspective: 1000px; }
        .story-item { position: absolute; width: 100%; text-align: center; opacity: 0; transform: translateY(50px) scale(0.9); transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform, opacity; }
        
        .story-item.active { opacity: 1; transform: translateY(0) scale(1); }
        .story-item.level-1 { transform: translateY(-140px) scale(0.95); opacity: 0.9; filter: blur(0px); }
        .story-item.level-2 { transform: translateY(-280px) scale(0.9); opacity: 0.6; filter: blur(1px); }
        .story-item.level-3 { transform: translateY(-420px) scale(0.8); opacity: 0.3; filter: blur(3px); }
        .story-item.level-4 { transform: translateY(-560px) scale(0.7); opacity: 0; display: none; }

        .narration { font-family: 'Playfair Display', serif; font-size: 1.9rem; line-height: 1.6; text-shadow: 0 5px 15px rgba(255,255,255,0.8); font-weight: bold; transition: color 2s ease, text-shadow 2s ease; }
        body.ruined-mode .narration { text-shadow: 0 5px 15px rgba(0,0,0,0.8); }

        .highlight { font-family: 'Dancing Script', cursive; font-size: 3rem; text-shadow: 0 0 20px rgba(255, 255, 255, 0.9); color: #d35400; }
        body.ruined-mode .highlight { color: #f1c40f; text-shadow: 0 0 20px rgba(0,0,0,0.9); }

        .instruction { position: absolute; bottom: 40px; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(0,0,0,0.6); animation: pulseText 2s infinite; pointer-events: none; z-index: 1000; transition: color 2s ease; }
        body.ruined-mode .instruction { color: rgba(255,255,255,0.4); }
        @keyframes pulseText { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .btn-back { position: absolute; top: 30px; left: 30px; padding: 10px 25px; background: rgba(0, 0, 0, 0.1); color: #2d3436; text-decoration: none; border-radius: 50px; border: 1px solid rgba(0, 0, 0, 0.2); backdrop-filter: blur(5px); font-weight: 500; transition: all 0.3s; z-index: 100; }
        .btn-back:hover { background: #2d3436; color: #fff; transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 0, 0, 0.2); }
        
        body.ruined-mode .btn-back { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); }
        body.ruined-mode .btn-back:hover { background: #fff; color: #1e272e; box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }

        .anim-word { display: inline-block; opacity: 0; transform: scale(1.2); filter: blur(8px); animation: whisperIn 1s cubic-bezier(0.2,0.8,0.2,1) forwards; }
        @keyframes whisperIn { to { opacity: 1; transform: scale(1); filter: blur(0); } }

        /* Effects */
        .floating-emoji { position: absolute; font-size: 3.5rem; pointer-events: none; z-index: 9999; animation: floatUpEmoji 3s ease-in forwards; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2)); }
        @keyframes floatUpEmoji { 0% { transform: translate(-50%, 0) scale(0); opacity: 1; } 100% { transform: translate(calc(-50% + var(--randX)), -60vh) scale(1.5) rotate(var(--randRot)); opacity: 0; } }

        /* Falling sadness */
        .fading-emoji { position: absolute; font-size: 4rem; pointer-events: none; z-index: 9999; animation: driftAway 4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; filter: grayscale(0.5) opacity(0.8); }
        @keyframes driftAway { 0% { transform: translate(-50%, 0) scale(1); opacity: 1; filter: blur(0px); } 100% { transform: translate(calc(-50% + var(--randX)), 50vh) scale(0.5) rotate(var(--randRot)); opacity: 0; filter: blur(10px); } }

    </style>
</head>
<body>
    <div id="page-entrance-overlay"></div>

    <a href="2023_details.html" class="btn-back">← Back to Moments</a>

    <div class="story-container" id="story-container"></div>
    <div class="instruction" id="instruction">Tap anywhere to reveal...</div>

    <script>
        const storyLines = [
            { type: 'narration', html: "We opened Snapchat. 👻✨" },
            { type: 'narration', html: "And suddenly, we were chatting on Snapchat non-stop.", effect: 'snap' },
            { type: 'narration', html: "We engaged more and more. Sharing our daily moments, our lives." },
            { type: 'narration', html: "You genuinely started getting really comfortable with me. 😊" },
            { type: 'narration', html: "But then... I made a mistake." },
            { type: 'narration', html: "I was kinda forcing you to officially accept me and all. Pressuring the situation." },
            { type: 'narration', html: "And honestly, it utterly ruined our talks. 😞", effect: 'sad' },
            { type: 'narration', html: "<span class='highlight' style='font-size: 3.5rem; display:inline-block; margin-top:10px;'>Then came the message.</span>", effect: 'glitch' },
            { type: 'narration', html: "You suddenly messaged me that you would be deactivating Snapchat for 1 month.", effect: 'ruin' },
            { type: 'narration', html: "You didn't even tell me the reason why. 😶" },
            { type: 'narration', html: "I thought you were just too tired of my behavior." },
            { type: 'narration', html: "I genuinely believed... you just wanted it all to end up right there.", effect: 'ending' },
            { type: 'narration', html: "<span class='highlight' style='font-size:4rem; margin-top:20px; display:inline-block;'>The Unexpected Silence.</span>", effect: 'done' }
        ];

        let currentIndex = 0;
        let isAnimating = false;
        const container = document.getElementById('story-container');
        const instruction = document.getElementById('instruction');

        function showNextLine() {
            if (currentIndex >= storyLines.length || isAnimating) return;
            isAnimating = true;

            const lineData = storyLines[currentIndex];

            const existingLines = container.querySelectorAll('.story-item');
            existingLines.forEach(line => {
                let lvl = parseInt(line.getAttribute('data-level') || 0);
                lvl++;
                line.setAttribute('data-level', lvl);
                line.className = `story-item level-${lvl}`;
            });

            const el = document.createElement('div');
            el.className = 'story-item active';
            el.setAttribute('data-level', '0');
            el.innerHTML = `<div class="narration">${lineData.html}</div>`;
            container.appendChild(el);

            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            let node;
            while(node = walker.nextNode()) {
                if(node.nodeValue.trim() !== '') textNodes.push(node);
            }
            
            let wordIndex = 0;
            textNodes.forEach(textNode => {
                const text = textNode.nodeValue;
                const fragment = document.createDocumentFragment();
                const words = text.split(/(\s+)/); 
                words.forEach(w => {
                    if (w.match(/^\s+$/)) {
                        fragment.appendChild(document.createTextNode(w));
                    } else if(w.length > 0) {
                        const span = document.createElement('span');
                        span.className = 'anim-word';
                        span.innerHTML = w;
                        span.style.animationDelay = (wordIndex * 150) + 'ms';
                        fragment.appendChild(span);
                        wordIndex++;
                    }
                });
                textNode.parentNode.replaceChild(fragment, textNode);
            });

            setTimeout(() => { isAnimating = false; }, (wordIndex * 150) + 600);

            if (lineData.effect === 'snap') triggerEmojiBurst(['👻', '💛', '📱', '✨'], 15);
            if (lineData.effect === 'sad') triggerEmojiFalling(['😞', '💔', '⬇️'], 8);
            if (lineData.effect === 'glitch') {
                document.body.classList.add('glitch-mode');
                setTimeout(() => document.body.classList.remove('glitch-mode'), 600);
            }
            if (lineData.effect === 'ruin') {
                document.body.classList.add('ruined-mode');
                triggerEmojiFalling(['🛑', '📱', '😶', '⬛'], 15);
            }
            if (lineData.effect === 'ending') triggerEmojiFalling(['🙍‍♂️', '💭', '💔'], 10);
            if (lineData.effect === 'done') addNextChapterLink();

            currentIndex++;
            if (currentIndex >= storyLines.length) {
                instruction.innerText = "Alone with my thoughts... 💭";
                instruction.style.animation = "none";
                instruction.style.opacity = "1";
            }
        }

        document.body.addEventListener('click', (e) => {
            if (e.target.closest('a')) return;
            createRipple(e.clientX, e.clientY);
            showNextLine();
        });

        setTimeout(showNextLine, 1000);

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '10px';
            ripple.style.height = '10px';
            ripple.style.background = 'rgba(0,0,0,0.3)';
            if(document.body.classList.contains('ruined-mode')) ripple.style.background = 'rgba(255,255,255,0.2)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'rippleOut 0.8s ease-out forwards';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);
        }

        const rippleStyle = document.createElement('style');
        rippleStyle.innerHTML = `@keyframes rippleOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(20); opacity: 0; } }`;
        document.head.appendChild(rippleStyle);

        function triggerEmojiBurst(icons, count) {
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'floating-emoji';
                    emoji.innerText = icons[Math.floor(Math.random() * icons.length)];
                    emoji.style.left = (window.innerWidth / 2) + 'px';
                    emoji.style.top = (window.innerHeight - 50) + 'px';
                    emoji.style.setProperty('--randX', ((Math.random() - 0.5) * 600) + 'px');
                    emoji.style.setProperty('--randRot', ((Math.random() - 0.5) * 360) + 'deg');
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 3000);
                }, i * (1500/count));
            }
        }
        
        function triggerEmojiFalling(icons, count) {
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'fading-emoji';
                    emoji.innerText = icons[Math.floor(Math.random() * icons.length)];
                    emoji.style.left = '50%';
                    emoji.style.top = '40%';
                    emoji.style.setProperty('--randX', ((Math.random() - 0.5) * 400) + 'px');
                    emoji.style.setProperty('--randRot', ((Math.random() - 0.5) * 180) + 'deg');
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 4000);
                }, i * (2000/count));
            }
        }

        function addNextChapterLink() {
            setTimeout(() => {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'story-item active';
                linkContainer.setAttribute('data-level', '0');
                linkContainer.style.marginTop = "40px";
                linkContainer.style.textAlign = "center";
                linkContainer.style.width = "100%";
                
                const nextBtn = document.createElement('a');
                nextBtn.href = "2023_moment20.html";
                nextBtn.innerHTML = "Continue to Moment 20 →";
                nextBtn.style.display = "inline-block";
                nextBtn.style.padding = "20px 40px";
                nextBtn.style.background = "linear-gradient(45deg, #111, #333)";
                nextBtn.style.color = "#f1c40f";
                nextBtn.style.textDecoration = "none";
                nextBtn.style.borderRadius = "50px";
                nextBtn.style.fontFamily = "'Montserrat', sans-serif";
                nextBtn.style.fontWeight = "bold";
                nextBtn.style.fontSize = "1.4rem";
                nextBtn.style.boxShadow = "0 10px 30px rgba(0, 0, 0, 0.9)";
                nextBtn.style.transition = "all 0.3s";
                nextBtn.style.border = "1px solid rgba(255,255,255,0.2)";
                nextBtn.style.animation = "pulseText 2s infinite";
                nextBtn.style.pointerEvents = "auto";
                
                nextBtn.onmouseover = () => { nextBtn.style.transform = "scale(1.1)"; nextBtn.style.color = "#fff"; };
                nextBtn.onmouseout = () => { nextBtn.style.transform = "scale(1)"; nextBtn.style.color = "#f1c40f"; };

                linkContainer.appendChild(nextBtn);
                container.appendChild(linkContainer);
                
                const existingLines = container.querySelectorAll('.story-item:not(:last-child)');
                existingLines.forEach(line => {
                    let lvl = parseInt(line.getAttribute('data-level') || 0);
                    lvl++;
                    line.setAttribute('data-level', lvl);
                    line.className = `story-item level-${lvl}`;
                });
                
                instruction.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
