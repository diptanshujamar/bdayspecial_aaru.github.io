<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 2025 Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #a18cd1;
            --secondary-color: #fbc2eb;
            --text-dark: #2c2c54;
        }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* 2025 Royal Love Preloader */
        #hex-preloader { position: fixed; inset: 0; background: linear-gradient(135deg, #4b0000, #1a0000); z-index: 9999999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 1.2s ease, visibility 1.2s; overflow: hidden; }
        #hex-preloader.hidden { opacity: 0; visibility: hidden; }
        
        .diamond-heart { margin-bottom: 50px; width: 80px; height: 80px; background: #ff4757; transform: rotate(45deg); position: relative; animation: diamondPulse 2s infinite cubic-bezier(0.1, 0.8, 0.3, 1); box-shadow: 0 0 60px rgba(255, 71, 87, 0.9); }
        .diamond-heart::before, .diamond-heart::after { content: ''; position: absolute; width: 80px; height: 80px; background: #ff4757; border-radius: 50%; box-shadow: 0 0 40px rgba(255, 71, 87, 0.7); }
        .diamond-heart::before { top: -40px; left: 0; }
        .diamond-heart::after { top: 0; left: 40px; }

        .gold-ring { position: absolute; width: 140px; height: 140px; border: 2px dashed #eccc68; border-radius: 50%; top: 0px; left: -30px; animation: spinRing 8s linear infinite; box-shadow: 0 0 20px rgba(236, 204, 104, 0.3); }

        @keyframes diamondPulse { 0% { transform: scale(0.9) rotate(45deg); } 50% { transform: scale(1.2) rotate(45deg); filter: brightness(1.5); } 100% { transform: scale(0.9) rotate(45deg); } }
        @keyframes spinRing { 100% { transform: rotate(360deg); } }

        .loading-text { font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 12px; font-size: 2rem; color: #fff; text-shadow: 0 0 20px #ff4757; display: flex; justify-content: center; margin-bottom: 20px; }
        .loading-text span { opacity: 0; filter: blur(10px); transform: translateX(-30px); animation: slideScan 1s forwards; }
        @keyframes slideScan { to { opacity: 1; filter: blur(0); transform: translateX(0); } }

        /* Falling Gold Dust */
        .gold-dust { position: absolute; inset: 0; background-image: radial-gradient(1px 1px at 20px 30px, #eccc68, rgba(0,0,0,0)), radial-gradient(2px 2px at 40px 70px, #eccc68, rgba(0,0,0,0)), radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)); background-repeat: repeat; background-size: 150px 150px; animation: snowDust 10s linear infinite; opacity: 0.6; pointer-events: none; }
        @keyframes snowDust { 0% { transform: translateY(0); } 100% { transform: translateY(150px); } }

        /* General page */
        .content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transform: translateY(50px); transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
        body.preloader-finished .content { opacity: 1; transform: translateY(0); }

        h1 { font-family: 'Dancing Script', cursive; font-size: 5rem; color: #a18cd1; margin-bottom: 20px; text-shadow: 0 5px 15px rgba(161, 140, 209, 0.4); }
        p { font-size: 1.2rem; color: #555; max-width: 600px; line-height: 1.6; text-align: center; }
        
        .btn-back { display: inline-block; padding: 15px 40px; background: #a18cd1; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 40px; transition: 0.3s; box-shadow: 0 10px 20px rgba(161, 140, 209, 0.4); }
        .btn-back:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(161, 140, 209, 0.6); }

        body.is-loading { overflow: hidden; height: 100vh; }
            /* Ambient floating particles */
        .ambient-particle { position: absolute; bottom: -5vh; border-radius: 50%; pointer-events: none; opacity: 0; background: radial-gradient(circle, #fff 0%, rgba(255,71,87,0.8) 40%, rgba(255,71,87,0) 80%); animation: floatParticle linear infinite; z-index: 15; }
        @keyframes floatParticle { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 0.8; } 80% { opacity: 0.6; } 100% { transform: translateY(-110vh) scale(1.5); opacity: 0; } }
        .glowing-orb { position: absolute; border-radius: 50%; background: linear-gradient(45deg, #ff4757, #eccc68); filter: blur(80px); opacity: 0.15; z-index: 1; animation: orbFloat 10s infinite alternate ease-in-out; pointer-events: none; }
        @keyframes orbFloat { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, -50px) scale(1.2); } }
        .progress-box { width: 320px; height: 6px; background: rgba(255, 255, 255, 0.05); margin: 20px auto 0; position: relative; overflow: hidden; border-radius: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 15px rgba(255, 71, 87, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); z-index: 20; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff4757, #eccc68, #ff4757); background-size: 200% 100%; border-radius: 20px; animation: fillProgress 3.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards, shimmer 2s linear infinite; box-shadow: 0 0 20px #ff4757; }
        .loading-subtext { font-family: 'Montserrat', sans-serif; font-size: 1rem; color: #fff; margin-top: 25px; letter-spacing: 3px; text-transform: uppercase; animation: pulseSubtext 2s infinite; font-weight: bold; text-align: center; }
        @keyframes pulseSubtext { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; text-shadow: 0 0 15px rgba(255,255,255,0.8); } }
        @keyframes fillProgress { 0% { width: 0%; } 20% { width: 15%; } 50% { width: 60%; } 80% { width: 85%; } 100% { width: 100%; } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body class="is-loading">

    <div id="hex-preloader">
        <div class="gold-dust"></div>
        <div style="position:relative;">
            <div class="diamond-heart"></div>
            <div class="gold-ring"></div>
        </div>
        <div class="loading-text">
            <span>2</span><span>0</span><span>2</span><span>5</span>
        </div>
        <div class="progress-box"><div class="progress-bar"></div></div>
        <div class="loading-subtext">Initializing the future...</div>

    </div>

    <div class="content">
        <h1>2025 Timeline</h1>
        <p>The current era. This is where you are living your story right now...</p>
        <a href="index.html" class="btn-back">← Back to Eras</a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const preloader = document.getElementById('hex-preloader');
            const spans = document.querySelectorAll('.loading-text span');
            
            spans.forEach((span, i) => { span.style.animationDelay = `${i * 0.2}s`; });

            
            const loaderDiv = document.getElementById('hex-preloader');
            const particlesContainer = document.createElement('div');
            particlesContainer.id = 'particles';
            particlesContainer.style.position = 'absolute';
            particlesContainer.style.inset = '0';
            loaderDiv.appendChild(particlesContainer);

            for(let i = 0; i < 50; i++) {
                let p = document.createElement('div');
                p.className = 'ambient-particle';
                let size = Math.random() * 8 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 5 + 4) + 's';
                p.style.animationDelay = Math.random() * 3 + 's';
                particlesContainer.appendChild(p);
            }
            for(let i = 0; i < 4; i++) {
                let orb = document.createElement('div');
                orb.className = 'glowing-orb';
                let size = Math.random() * 300 + 200;
                orb.style.width = size + 'px';
                orb.style.height = size + 'px';
                orb.style.left = (Math.random() * 80) + 'vw';
                orb.style.top = (Math.random() * 80) + 'vh';
                orb.style.animationDelay = Math.random() * 5 + 's';
                orb.style.animationDuration = (Math.random() * 10 + 10) + 's';
                loaderDiv.appendChild(orb);
            }

            setTimeout(() => {
                preloader.classList.add('hidden');
                document.body.classList.remove('is-loading');
                setTimeout(() => { 
                    preloader.style.display = 'none'; 
                    document.body.classList.add('preloader-finished');
                }, 1200);
            }, 3800);
        });
    </script>
</body>
</html>
