<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 22: Getting Caught</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        /* Base green/blue WhatsApp/Telegram theme */
        body { margin: 0; min-height: 100vh; overflow: hidden; background: linear-gradient(135deg, #10ac84, #1dd1a1); color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 2s ease, filter 2s ease, color 2s ease; }
        
        /* The caught/warning red theme */
        body.warning-mode { background: linear-gradient(135deg, #d63031, #c0392b, #833471); color: #fff; animation: screenShake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes screenShake { 0% { transform: translate(0) } 25% { transform: translate(6px, -6px) } 50% { transform: translate(-6px, 6px) } 75% { transform: translate(6px, 6px) } 100% { transform: translate(0) } }

        body.despair-mode { background: linear-gradient(135deg, #2d3436, #353b48); color: #dfe6e9; filter: grayscale(0.2); }
        
        body.truecaller-mode { background: linear-gradient(135deg, #0984e3, #4bcffa); transition: background 3s ease; }

        #page-entrance-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; z-index: 9999999; animation: fadeOutWhite 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        @keyframes fadeOutWhite { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* Siren overlay effect */
        .siren-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, rgba(214, 48, 49, 0.4) 0%, transparent 60%); z-index: 5; pointer-events: none; opacity: 0; transition: opacity 0.5s; animation: sirenPulse 2s infinite alternate; }
        body.warning-mode .siren-overlay { opacity: 1; }
        body.despair-mode .siren-overlay { opacity: 0; }
        body.truecaller-mode .siren-overlay { opacity: 0; }
        @keyframes sirenPulse { 0% { transform: scale(1); filter: brightness(1); } 100% { transform: scale(1.2); filter: brightness(1.5); } }

        .story-container { width: 90%; max-width: 800px; height: 75vh; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 10; perspective: 1000px; }
        .story-item { position: absolute; width: 100%; text-align: center; opacity: 0; transform: translateY(50px) scale(0.9); transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform, opacity; }
        
        .story-item.active { opacity: 1; transform: translateY(0) scale(1); }
        .story-item.level-1 { transform: translateY(-140px) scale(0.95); opacity: 0.9; filter: blur(0px); }
        .story-item.level-2 { transform: translateY(-280px) scale(0.9); opacity: 0.6; filter: blur(1px); }
        .story-item.level-3 { transform: translateY(-420px) scale(0.8); opacity: 0.3; filter: blur(3px); }
        .story-item.level-4 { transform: translateY(-560px) scale(0.7); opacity: 0; display: none; }

        .narration { font-family: 'Playfair Display', serif; font-size: 1.9rem; line-height: 1.6; text-shadow: 0 5px 15px rgba(0,0,0,0.3); font-weight: bold; transition: color 2s ease, text-shadow 2s ease; }

        .highlight { font-family: 'Dancing Script', cursive; font-size: 3rem; text-shadow: 0 0 20px rgba(255, 255, 255, 0.6); color: #feca57; transition: color 2s; }
        body.warning-mode .highlight { color: #ffeaa7; text-shadow: 0 0 20px rgba(214, 48, 49, 0.9); }
        body.despair-mode .highlight { color: #ff7675; text-shadow: 0 0 20px rgba(0,0,0, 0.9); }
        body.truecaller-mode .highlight { color: #81ecec; text-shadow: 0 0 20px rgba(255, 255, 255, 0.9); }

        .instruction { position: absolute; bottom: 40px; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.6); animation: pulseText 2s infinite; pointer-events: none; z-index: 1000; transition: color 2s ease; }
        @keyframes pulseText { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .btn-back { position: absolute; top: 30px; left: 30px; padding: 10px 25px; background: rgba(255, 255, 255, 0.1); color: #fff; text-decoration: none; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); font-weight: 500; transition: all 0.3s; z-index: 100; }
        .btn-back:hover { background: #fff; color: #10ac84; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }

        body.warning-mode .btn-back:hover { color: #d63031; }
        body.despair-mode .btn-back:hover { color: #2d3436; }
        body.truecaller-mode .btn-back:hover { color: #0984e3; }

        .anim-word { display: inline-block; opacity: 0; transform: scale(1.2); filter: blur(8px); animation: whisperIn 1s cubic-bezier(0.2,0.8,0.2,1) forwards; }
        @keyframes whisperIn { to { opacity: 1; transform: scale(1); filter: blur(0); } }

        /* Floating Drops */
        .emoji-drop { position: absolute; font-size: 3rem; pointer-events: none; z-index: 9999; animation: dropDown 3s cubic-bezier(.25, .46, .45, .94) forwards; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); opacity: 0.9; }
        @keyframes dropDown { 0% { transform: translate(-50%, -20vh) scale(0) rotate(0deg); opacity: 0; } 20% { transform: translate(-50%, 0vh) scale(1.2) rotate(45deg); opacity: 1; } 100% { transform: translate(calc(-50% + var(--randX)), 100vh) scale(0.8) rotate(var(--randRot)); opacity: 0; } }

    </style>
</head>
<body>
    <div id="page-entrance-overlay"></div>
    <div class="siren-overlay"></div>

    <a href="2023_details.html" class="btn-back">← Back to Moments</a>

    <div class="story-container" id="story-container"></div>
    <div class="instruction" id="instruction">Tap anywhere to reveal...</div>

    <script>
        const storyLines = [
            { type: 'narration', html: "The month was November." },
            { type: 'narration', html: "We had originally started talking casually on Telegram... ✈️" },
            { type: 'narration', html: "But then we officially shifted completely over to WhatsApp on my own number. 💬", effect: 'whatsapp' },
            { type: 'narration', html: "I was continuously pushing limits, testing boundaries, purely challenging myself." },
            { type: 'narration', html: "I was so incredibly overconfident. 👑" },
            { type: 'narration', html: "I genuinely believed that absolutely no one was ever going to find out that I was madly in love with you." },
            { type: 'narration', html: "<span class='highlight' style='font-size: 3.5rem; display:inline-block; margin-top:10px;'>Until... the inevitable happened.</span>" },
            { type: 'narration', html: "For the very first time... I got caught completely red-handed at home. 🚨😰", effect: 'caught' },
            { type: 'narration', html: "One day, my mother actually saw all of our chats. 📄👁️" },
            { type: 'narration', html: "She directly cornered me and desperately asked me for the cold hard truth." },
            { type: 'narration', html: "And honestly... I completely denied everything. 😶" },
            { type: 'narration', html: "I didn't tell her anything." },
            { type: 'narration', html: "But the damage was permanently done. I got a strict, terrifying warning. 🚫", effect: 'despair' },
            { type: 'narration', html: "I was warned that I absolutely must not do these things ever again." },
            { type: 'narration', html: "The whole experience was horribly devastating." },
            { type: 'narration', html: "<span class='highlight' style='font-size: 3.5rem; margin-top:20px; display:inline-block;'>But... I couldn't stop.</span>" },
            { type: 'narration', html: "I was purely, entirely addicted to you as hell. ❤️‍🔥" },
            { type: 'narration', html: "I physically couldn't maintain the painful distance from you... no matter the risk." },
            { type: 'narration', html: "So I recklessly, desperately tried one last thing." },
            { type: 'narration', html: "I tried to contact you straight from my Truecaller again. 📞✨", effect: 'truecaller' },
            { type: 'narration', html: "And once again... we just started talking.", effect: 'falling' },
            { type: 'narration', html: "<span class='highlight' style='font-size:4rem; margin-top:20px; display:inline-block;'>Irresistible Addiction.</span>", effect: 'end' }
        ];

        let currentIndex = 0;
        let isAnimating = false;
        const container = document.getElementById('story-container');
        const instruction = document.getElementById('instruction');

        function showNextLine() {
            if (currentIndex >= storyLines.length || isAnimating) return;
            isAnimating = true;

            const lineData = storyLines[currentIndex];

            const existingLines = container.querySelectorAll('.story-item');
            existingLines.forEach(line => {
                let lvl = parseInt(line.getAttribute('data-level') || 0);
                lvl++;
                line.setAttribute('data-level', lvl);
                line.className = `story-item level-${lvl}`;
            });

            const el = document.createElement('div');
            el.className = 'story-item active';
            el.setAttribute('data-level', '0');
            el.innerHTML = `<div class="narration">${lineData.html}</div>`;
            container.appendChild(el);

            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            let node;
            while(node = walker.nextNode()) {
                if(node.nodeValue.trim() !== '') textNodes.push(node);
            }
            
            let wordIndex = 0;
            textNodes.forEach(textNode => {
                const text = textNode.nodeValue;
                const fragment = document.createDocumentFragment();
                const words = text.split(/(\s+)/); 
                words.forEach(w => {
                    if (w.match(/^\s+$/)) {
                        fragment.appendChild(document.createTextNode(w));
                    } else if(w.length > 0) {
                        const span = document.createElement('span');
                        span.className = 'anim-word';
                        span.innerHTML = w;
                        span.style.animationDelay = (wordIndex * 150) + 'ms';
                        fragment.appendChild(span);
                        wordIndex++;
                    }
                });
                textNode.parentNode.replaceChild(fragment, textNode);
            });

            setTimeout(() => { isAnimating = false; }, (wordIndex * 150) + 600);

            if (lineData.effect === 'whatsapp') triggerEmojiDrops(['📱', '💬', '👀'], 10);
            if (lineData.effect === 'caught') {
                document.body.classList.add('warning-mode');
                triggerEmojiDrops(['🚨', '😰', '👀', '🔥'], 15);
            }
            if (lineData.effect === 'despair') {
                document.body.classList.remove('warning-mode');
                document.body.classList.add('despair-mode');
                triggerEmojiDrops(['🚫', '🛑', '😞'], 10);
            }
            if (lineData.effect === 'truecaller') {
                document.body.classList.remove('despair-mode');
                document.body.classList.add('truecaller-mode');
                triggerEmojiDrops(['📞', '✨', '🥺'], 15);
            }
            if (lineData.effect === 'falling') triggerEmojiDrops(['❤️‍🔥', '💬', '🥰'], 8);
            if (lineData.effect === 'end') addNextChapterLink();

            currentIndex++;
            if (currentIndex >= storyLines.length) {
                instruction.innerText = "Never letting go... ❤️‍🔥";
                instruction.style.animation = "none";
                instruction.style.opacity = "1";
            }
        }

        document.body.addEventListener('click', (e) => {
            if (e.target.closest('a')) return;
            createRipple(e.clientX, e.clientY);
            showNextLine();
        });

        setTimeout(showNextLine, 1000);

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '10px';
            ripple.style.height = '10px';
            
            ripple.style.background = 'rgba(255,255,255,0.4)';
            if(document.body.classList.contains('warning-mode')) ripple.style.background = 'rgba(255, 255, 255, 0.6)';
            
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'rippleOut 0.8s ease-out forwards';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);
        }

        const rippleStyle = document.createElement('style');
        rippleStyle.innerHTML = `@keyframes rippleOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(20); opacity: 0; } }`;
        document.head.appendChild(rippleStyle);

        function triggerEmojiDrops(icons, count) {
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'emoji-drop';
                    emoji.innerText = icons[Math.floor(Math.random() * icons.length)];
                    emoji.style.left = (window.innerWidth / 2) + 'px';
                    emoji.style.setProperty('--randX', ((Math.random() - 0.5) * 800) + 'px');
                    emoji.style.setProperty('--randRot', ((Math.random() - 0.5) * 360) + 'deg');
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 3000);
                }, i * (1500/count));
            }
        }

        function addNextChapterLink() {
            setTimeout(() => {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'story-item active';
                linkContainer.setAttribute('data-level', '0');
                linkContainer.style.marginTop = "40px";
                linkContainer.style.textAlign = "center";
                linkContainer.style.width = "100%";
                
                const nextBtn = document.createElement('a');
                nextBtn.href = "2023_details.html";
                nextBtn.innerHTML = "Return to Moments Grid →";
                nextBtn.style.display = "inline-block";
                nextBtn.style.padding = "20px 40px";
                nextBtn.style.background = "linear-gradient(45deg, #111, #333)";
                nextBtn.style.color = "#4bcffa";
                nextBtn.style.textDecoration = "none";
                nextBtn.style.borderRadius = "50px";
                nextBtn.style.fontFamily = "'Montserrat', sans-serif";
                nextBtn.style.fontWeight = "bold";
                nextBtn.style.fontSize = "1.4rem";
                nextBtn.style.boxShadow = "0 10px 30px rgba(0, 0, 0, 0.5)";
                nextBtn.style.transition = "all 0.3s";
                nextBtn.style.border = "1px solid rgba(255,255,255,0.2)";
                nextBtn.style.animation = "pulseText 2s infinite";
                nextBtn.style.pointerEvents = "auto";
                
                nextBtn.onmouseover = () => { nextBtn.style.transform = "scale(1.1)"; nextBtn.style.boxShadow = "0 15px 40px rgba(0,0,0,0.8)"; nextBtn.style.color = "#fff"; };
                nextBtn.onmouseout = () => { nextBtn.style.transform = "scale(1)"; nextBtn.style.boxShadow = "0 10px 30px rgba(0,0,0,0.5)"; nextBtn.style.color = "#4bcffa"; };

                linkContainer.appendChild(nextBtn);
                container.appendChild(linkContainer);
                
                const existingLines = container.querySelectorAll('.story-item:not(:last-child)');
                existingLines.forEach(line => {
                    let lvl = parseInt(line.getAttribute('data-level') || 0);
                    lvl++;
                    line.setAttribute('data-level', lvl);
                    line.className = `story-item level-${lvl}`;
                });
                
                instruction.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
