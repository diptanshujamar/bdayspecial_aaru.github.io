<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 11: (This Message Was Deleted)</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; min-height: 100vh; overflow: hidden; background: linear-gradient(135deg, #075E54, #128C7E, #1F2C34); color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 3s ease, color 3s ease; }
        
        body.valentine { background: linear-gradient(135deg, #ff758c, #ff7eb3, #ff0844); }

        #page-entrance-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; z-index: 9999999; animation: fadeOutWhite 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        @keyframes fadeOutWhite { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* Subtle Whatsapp Doodle Background */
        .doodles { position: fixed; inset: 0; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" opacity="0.05"><text x="10" y="50" font-size="20">📱</text><text x="60" y="80" font-size="20">💬</text><text x="40" y="20" font-size="20">✨</text></svg>'); z-index: 1; pointer-events: none; transition: opacity 3s ease; }
        body.valentine .doodles { opacity: 0; }

        .story-container { width: 90%; max-width: 800px; height: 75vh; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 10; perspective: 1000px; }
        .story-item { position: absolute; width: 100%; text-align: center; opacity: 0; transform: translateY(50px) scale(0.9); transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform, opacity; }
        
        .story-item.active { opacity: 1; transform: translateY(0) scale(1); }
        .story-item.level-1 { transform: translateY(-140px) scale(0.95); opacity: 0.9; filter: blur(0px); }
        .story-item.level-2 { transform: translateY(-280px) scale(0.9); opacity: 0.6; filter: blur(1px); }
        .story-item.level-3 { transform: translateY(-420px) scale(0.8); opacity: 0.3; filter: blur(3px); }
        .story-item.level-4 { transform: translateY(-560px) scale(0.7); opacity: 0; display: none; }

        .narration { font-family: 'Playfair Display', serif; font-size: 1.9rem; line-height: 1.6; text-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: bold; }
        .highlight { font-family: 'Dancing Script', cursive; font-size: 3.2rem; text-shadow: 0 0 20px rgba(255, 255, 255, 0.5); }

        /* Chat Bubbles */
        .chat-container { display: flex; flex-direction: column; align-items: flex-end; width: 100%; }
        .chat-bubble { display: inline-block; padding: 15px 25px; border-radius: 20px; font-family: 'Montserrat', sans-serif; font-size: 1.4rem; max-width: 80%; text-align: left; box-shadow: 0 10px 20px rgba(0,0,0,0.3); position: relative; background: #DCF8C6; color: #303030; border-bottom-right-radius: 5px; font-weight: 500; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center right; }
        .speaker-name { font-size: 0.9rem; margin-bottom: 5px; opacity: 0.8; font-weight: bold; letter-spacing: 1px; color: #fff; margin-right: 15px; }

        /* Deleted message styling */
        .chat-bubble.deleted { background: rgba(255,255,255,0.2) !important; color: rgba(255,255,255,0.7) !important; border: 1px solid rgba(255,255,255,0.4); font-style: italic; box-shadow: none; animation: crumpleMessage 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes crumpleMessage { 0% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0); } 30% { transform: scale(0.8) rotate(-2deg); opacity: 0.8; filter: blur(2px); } 60% { transform: scale(0.9) rotate(1deg); opacity: 0.9; } 100% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0); } }

        .instruction { position: absolute; bottom: 40px; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.6); animation: pulseText 2s infinite; pointer-events: none; z-index: 1000; }
        @keyframes pulseText { 0%, 100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .btn-back { position: absolute; top: 30px; left: 30px; padding: 10px 25px; background: rgba(255, 255, 255, 0.2); color: #fff; text-decoration: none; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.4); backdrop-filter: blur(5px); font-weight: 500; transition: all 0.3s; z-index: 100; }
        .btn-back:hover { background: #fff; color: #075E54; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); border-color: transparent; }
        body.valentine .btn-back:hover { color: #ff0844; }

        .anim-word { display: inline-block; opacity: 0; transform: scale(1.2); filter: blur(8px); animation: whisperIn 1s cubic-bezier(0.2,0.8,0.2,1) forwards; }
        @keyframes whisperIn { to { opacity: 1; transform: scale(1); filter: blur(0); } }

        /* Effects */
        .floating-emoji { position: absolute; font-size: 3rem; pointer-events: none; z-index: 9999; animation: floatUpEmoji 3s ease-in forwards; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        @keyframes floatUpEmoji { 0% { transform: translate(-50%, 0) scale(0); opacity: 1; } 100% { transform: translate(calc(-50% + var(--randX)), -60vh) scale(1.5) rotate(var(--randRot)); opacity: 0; } }

    </style>
</head>
<body>
    <div id="page-entrance-overlay"></div>
    <div class="doodles"></div>

    <a href="2023_details.html" class="btn-back">← Back to Moments</a>

    <div class="story-container" id="story-container"></div>
    <div class="instruction" id="instruction">Tap anywhere to reveal...</div>

    <script>
        const storyLines = [
            { type: 'narration', html: "The new year started, bringing a whole new era of our story... 🌅" },
            { type: 'narration', html: "I had finally started texting you properly on WhatsApp. 📱" },
            { type: 'narration', html: "But honestly? I was absolutely terrified." },
            { type: 'chat', speaker: 'Me 🥺', cls: 'me', text: "Hey! Just wanted to say you looked really pretty today and—", effect: 'type' },
            { type: 'delete', text: "🚫 This message was deleted" },
            { type: 'narration', html: "I kept typing out entire messages, second-guessing myself entirely.", effect: 'chuckle' },
            { type: 'narration', html: "I kept thinking: *'Wait, is this even appropriate to send?'*" },
            { type: 'chat', speaker: 'Me 🥺', cls: 'me', text: "I was wondering if we could maybe hang out some—", effect: 'type' },
            { type: 'delete', text: "🚫 This message was deleted" },
            { type: 'narration', html: "I did this so many times. Typing, panicking, deleting, and trying again safely. 😅" },
            { type: 'narration', html: "Amidst all those deleted texts and late-night talks..." },
            { type: 'narration', html: "...the month of January somehow completely flew by alongside our exams. 📚⏳" },
            { type: 'narration', html: "And then... February arrived. 💌", effect: 'valentine' },
            { type: 'narration', html: "The month of Valentine's. ❤️" },
            { type: 'narration', html: "I was soooo incredibly excited for everything. 💓" },
            { type: 'narration', html: "But at the exact same time, I was unsure if I should actually do any of the things I was planning." },
            { type: 'narration', html: "Well... let's just see what happened there. 😉" },
            { type: 'narration', html: "<span class='highlight' style='font-size:4rem; margin-top:20px; display:inline-block; color:#fff;'>Approaching Valentine's.</span>", effect: 'end' }
        ];

        let currentIndex = 0;
        let isAnimating = false;
        let lastChatBubble = null; // Track the most recent chat bubble to apply deletion

        const container = document.getElementById('story-container');
        const instruction = document.getElementById('instruction');

        function showNextLine() {
            if (currentIndex >= storyLines.length || isAnimating) return;
            isAnimating = true;

            const lineData = storyLines[currentIndex];

            if (lineData.type === 'delete') {
                // Instantly mutate the previous chat bubble instead of pushing a new row
                if (lastChatBubble) {
                    lastChatBubble.classList.add('deleted');
                    lastChatBubble.innerText = lineData.text;
                    triggerEmojiBurst(['🗑️', '🚫', '🙈'], 5);
                }
                setTimeout(() => { isAnimating = false; }, 800);
                currentIndex++;
                return;
            }

            const existingLines = container.querySelectorAll('.story-item');
            existingLines.forEach(line => {
                let lvl = parseInt(line.getAttribute('data-level') || 0);
                lvl++;
                line.setAttribute('data-level', lvl);
                line.className = `story-item level-${lvl}`;
            });

            const el = document.createElement('div');
            el.className = 'story-item active';
            el.setAttribute('data-level', '0');
            
            if (lineData.type === 'narration') {
                el.innerHTML = `<div class="narration">${lineData.html}</div>`;
                lastChatBubble = null;
            } else if (lineData.type === 'chat') {
                el.innerHTML = `
                    <div class="chat-container ${lineData.cls}">
                        <span class="speaker-name">${lineData.speaker}</span>
                        <div class="chat-bubble typing" id="chat-${currentIndex}">...</div>
                    </div>
                `;
            }
            container.appendChild(el);

            if (lineData.type === 'narration') {
                const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
                const textNodes = [];
                let node;
                while(node = walker.nextNode()) {
                    if(node.nodeValue.trim() !== '') textNodes.push(node);
                }
                let wordIndex = 0;
                textNodes.forEach(textNode => {
                    const text = textNode.nodeValue;
                    const fragment = document.createDocumentFragment();
                    const words = text.split(/(\s+)/); 
                    words.forEach(w => {
                        if (w.match(/^\s+$/)) {
                            fragment.appendChild(document.createTextNode(w));
                        } else if(w.length > 0) {
                            const span = document.createElement('span');
                            span.className = 'anim-word';
                            span.innerHTML = w;
                            span.style.animationDelay = (wordIndex * 150) + 'ms';
                            fragment.appendChild(span);
                            wordIndex++;
                        }
                    });
                    textNode.parentNode.replaceChild(fragment, textNode);
                });
                setTimeout(() => { isAnimating = false; }, (wordIndex * 150) + 600);
            } else if (lineData.type === 'chat') {
                // Simulate typing delay before revealing text
                lastChatBubble = document.getElementById(`chat-${currentIndex}`);
                setTimeout(() => {
                    lastChatBubble.innerText = lineData.text;
                    lastChatBubble.classList.remove('typing');
                    isAnimating = false;
                }, 1000);
            }

            if (lineData.effect === 'chuckle') triggerEmojiBurst(['😅', '🤦‍♂️', '💭'], 8);
            if (lineData.effect === 'valentine') {
                document.body.classList.add('valentine');
                triggerEmojiBurst(['💌', '💘', '💗', '💕'], 20);
            }
            if (lineData.effect === 'end') addNextChapterLink();

            currentIndex++;
            if (currentIndex >= storyLines.length) {
                instruction.innerText = "To be continued in February... 💌";
                instruction.style.animation = "none";
                instruction.style.opacity = "1";
            }
        }

        document.body.addEventListener('click', (e) => {
            if (e.target.closest('a')) return;
            createRipple(e.clientX, e.clientY);
            showNextLine();
        });

        setTimeout(showNextLine, 1000);

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '10px';
            ripple.style.height = '10px';
            ripple.style.background = 'rgba(255,255,255,0.7)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'rippleOut 0.8s ease-out forwards';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);
        }

        const rippleStyle = document.createElement('style');
        rippleStyle.innerHTML = `@keyframes rippleOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(20); opacity: 0; } }`;
        document.head.appendChild(rippleStyle);

        function triggerEmojiBurst(icons, count) {
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'floating-emoji';
                    emoji.innerText = icons[Math.floor(Math.random() * icons.length)];
                    emoji.style.left = (window.innerWidth / 2) + 'px';
                    emoji.style.top = (window.innerHeight - 50) + 'px';
                    emoji.style.setProperty('--randX', ((Math.random() - 0.5) * 600) + 'px');
                    emoji.style.setProperty('--randRot', ((Math.random() - 0.5) * 360) + 'deg');
                    emoji.style.animation = 'floatUpEmoji 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 3000);
                }, i * 200);
            }
        }

        function addNextChapterLink() {
            setTimeout(() => {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'story-item active';
                linkContainer.setAttribute('data-level', '0');
                linkContainer.style.marginTop = "40px";
                linkContainer.style.textAlign = "center";
                linkContainer.style.width = "100%";
                
                const nextBtn = document.createElement('a');
                nextBtn.href = "2023_moment12.html";
                nextBtn.innerHTML = "Continue the Story →";
                nextBtn.style.display = "inline-block";
                nextBtn.style.padding = "20px 40px";
                nextBtn.style.background = "linear-gradient(45deg, #fff, #ff7eb3)";
                nextBtn.style.color = "#ff0844";
                nextBtn.style.textDecoration = "none";
                nextBtn.style.borderRadius = "50px";
                nextBtn.style.fontFamily = "'Montserrat', sans-serif";
                nextBtn.style.fontWeight = "bold";
                nextBtn.style.fontSize = "1.4rem";
                nextBtn.style.boxShadow = "0 10px 30px rgba(255, 255, 255, 0.7)";
                nextBtn.style.transition = "all 0.3s";
                nextBtn.style.border = "1px solid rgba(255,255,255,0.2)";
                nextBtn.style.animation = "pulseText 2s infinite";
                nextBtn.style.pointerEvents = "auto";
                
                nextBtn.onmouseover = () => { nextBtn.style.transform = "scale(1.1)"; };
                nextBtn.onmouseout = () => { nextBtn.style.transform = "scale(1)"; };

                linkContainer.appendChild(nextBtn);
                container.appendChild(linkContainer);
                
                const existingLines = container.querySelectorAll('.story-item:not(:last-child)');
                existingLines.forEach(line => {
                    let lvl = parseInt(line.getAttribute('data-level') || 0);
                    lvl++;
                    line.setAttribute('data-level', lvl);
                    line.className = `story-item level-${lvl}`;
                });
                
                instruction.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
