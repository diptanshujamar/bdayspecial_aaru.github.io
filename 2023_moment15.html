<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 15: The 1 AM Confession</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; min-height: 100vh; overflow: hidden; background: linear-gradient(135deg, #0f2027, #2c5364); color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 3s ease, color 3s ease; }
        
        body.morning-mode { background: linear-gradient(135deg, #89f7fe, #66a6ff); color: #1a1a1a; }
        body.morning-mode .narration { text-shadow: 0 5px 15px rgba(255,255,255,0.6); }

        #page-entrance-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; z-index: 9999999; animation: fadeOutWhite 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        @keyframes fadeOutWhite { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* Stars for night mode */
        .stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; transition: opacity 3s ease; }
        body.morning-mode .stars { opacity: 0; }
        .stars::after { content: ''; position: absolute; width: 2px; height: 2px; background: transparent; box-shadow: 20px 20px #FFF, 150px 100px #FFF, 450px 30px #FFF, 320px 450px #FFF, 600px 350px #FFF, 800px 100px #FFF, 950px 200px #FFF, 90px 300px #FFF, 750px 450px #FFF, 1050px 50px #FFF; animation: twinkle 5s infinite linear; }
        @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* Sunbeam for morning mode */
        .sunbeam { position: fixed; top:-50vh; right:-50vw; width:150vw; height:150vh; background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 60%); opacity: 0; pointer-events: none; z-index: 1; transition: opacity 3s ease; }
        body.morning-mode .sunbeam { opacity: 1; animation: rotateSun 20s linear infinite; }
        @keyframes rotateSun { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .story-container { width: 90%; max-width: 800px; height: 75vh; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 10; perspective: 1000px; }
        .story-item { position: absolute; width: 100%; text-align: center; opacity: 0; transform: translateY(50px) scale(0.9); transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform, opacity; }
        
        .story-item.active { opacity: 1; transform: translateY(0) scale(1); }
        .story-item.level-1 { transform: translateY(-140px) scale(0.95); opacity: 0.9; filter: blur(0px); }
        .story-item.level-2 { transform: translateY(-280px) scale(0.9); opacity: 0.6; filter: blur(1px); }
        .story-item.level-3 { transform: translateY(-420px) scale(0.8); opacity: 0.3; filter: blur(3px); }
        .story-item.level-4 { transform: translateY(-560px) scale(0.7); opacity: 0; display: none; }

        .narration { font-family: 'Playfair Display', serif; font-size: 1.9rem; line-height: 1.6; text-shadow: 0 5px 15px rgba(0,0,0,0.5); font-weight: bold; transition: color 3s ease; }
        .highlight { font-family: 'Dancing Script', cursive; font-size: 3rem; text-shadow: 0 0 20px rgba(255, 255, 255, 0.4); }

        .instruction { position: absolute; bottom: 40px; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.6); animation: pulseText 2s infinite; pointer-events: none; z-index: 1000; transition: color 3s ease; }
        body.morning-mode .instruction { color: rgba(0,0,0,0.5); }
        @keyframes pulseText { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        .btn-back { position: absolute; top: 30px; left: 30px; padding: 10px 25px; background: rgba(255, 255, 255, 0.2); color: #fff; text-decoration: none; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.4); backdrop-filter: blur(5px); font-weight: 500; transition: all 0.3s; z-index: 100; }
        .btn-back:hover { background: #fff; color: #0f2027; transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 255, 255, 0.5); border-color: transparent; }
        body.morning-mode .btn-back { color: #000; border-color: rgba(0,0,0,0.2); }
        body.morning-mode .btn-back:hover { background: #000; color: #fff; }

        .anim-word { display: inline-block; opacity: 0; transform: scale(1.2); filter: blur(8px); animation: whisperIn 1s cubic-bezier(0.2,0.8,0.2,1) forwards; }
        @keyframes whisperIn { to { opacity: 1; transform: scale(1); filter: blur(0); } }

        /* Chat bubbles for Bro */
        .chat-bubble { display: inline-block; padding: 10px 20px; background: #25D366; color:#fff; border-radius: 20px; border-bottom-right-radius: 5px; font-family: 'Montserrat', sans-serif; font-size: 1.5rem; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transform: scale(0); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .chat-bubble.her { background: #128C7E; border-bottom-right-radius: 20px; border-bottom-left-radius: 5px; }
        @keyframes popIn { 100% { transform: scale(1); } }

        /* Effects */
        .window-flash { position: fixed; inset: 0; background: #fff; z-index: 999; opacity: 0; pointer-events: none; }
        @keyframes flashWhite { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        .floating-emoji { position: absolute; font-size: 3.5rem; pointer-events: none; z-index: 9999; animation: floatUpEmoji 3s ease-in forwards; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); }
        @keyframes floatUpEmoji { 0% { transform: translate(-50%, 0) scale(0); opacity: 1; } 100% { transform: translate(calc(-50% + var(--randX)), -60vh) scale(1.5) rotate(var(--randRot)); opacity: 0; } }

    </style>
</head>
<body>
    <div id="page-entrance-overlay"></div>
    <div class="stars"></div>
    <div class="sunbeam"></div>
    <div class="window-flash" id="flash"></div>

    <a href="2023_details.html" class="btn-back">← Back to Moments</a>

    <div class="story-container" id="story-container"></div>
    <div class="instruction" id="instruction">Tap anywhere to reveal...</div>

    <script>
        for(let i=0; i<3; i++) {
            let starBox = document.createElement('div');
            starBox.className = 'stars';
            starBox.style.setProperty('top', (i*100) + 'px');
            starBox.style.setProperty('left', (i*50) + 'px');
            starBox.style.animationDelay = (i*1.5) + 's';
            document.body.appendChild(starBox);
        }

        const storyLines = [
            { type: 'narration', html: "February 27th. 🌙" },
            { type: 'narration', html: "The night before our very first board exam... English. 📚" },
            { type: 'narration', html: "We were chatting on WhatsApp. And honestly, that was the first time we had ever talked *that* much. 📱💬" },
            { type: 'narration', html: "Around 1 AM... you were heavily teasing me. Continuously. 🙄😂" },
            { type: 'chat', html: "<div class='chat-bubble her'>Okay bro 😂</div><br><div class='chat-bubble her' style='animation-delay: 0.5s;'>Sun bhai 🙄</div>", effect: 'bro' },
            { type: 'narration', html: "I was absolutely not ready for this moment yet, but hearing that..." },
            { type: 'narration', html: "...I finally decided to tell you *everything* I had been hiding in my chest. ❤️‍🔥" },
            { type: 'narration', html: "I confessed it. I fully broke down and told you:", effect: 'heartbeat' },
            { type: 'narration', html: "<span class='highlight' style='color:#ff7eb3; font-size: 3.5rem; line-height: 1.2; display:inline-block; margin-top:10px;'>'Aarushi, I love you sooo sooo sooo much.'</span> 🥺❤️", effect: 'confess' },
            { type: 'narration', html: "But then... you completely stunned me. 🤯" },
            { type: 'narration', html: "You calmly sent a text saying that you *already knew* I was in love with you!" },
            { type: 'narration', html: "I was just sitting there in my room, staring at my screen like, *'Wait, who even told her?!'* 🕵️‍♂️🔭" },
            { type: 'narration', html: "But later, I realized... my actions alone were more than enough to perfectly tell you. ✨" },
            { type: 'narration', html: "That was the most precious night for me. We spent almost 3 hours just casually talking to each other. 🌌🕰️" },
            { type: 'narration', html: "Then... the morning arrived. 🌅", effect: 'morning' },
            { type: 'narration', html: "It was time for the exam. I was already at the exam center. 🏫" },
            { type: 'narration', html: "I was well aware of exactly what your room number was." },
            { type: 'narration', html: "I walked over, and there you were... sitting right by the window. 🪟" },
            { type: 'narration', html: "I gently knocked on the window class. *Knock knock.* ✊", effect: 'knock' },
            { type: 'narration', html: "You looked up, and I saw how incredibly happy you were to see me. 🥰" },
            { type: 'narration', html: "You suddenly opened the window right then and there." },
            { type: 'narration', html: "Just 10 minutes before the exam started..." },
            { type: 'narration', html: "I looked at you, wished you a massive 'All the best!', and happily walked back to my own class. 🍀🌟", effect: 'window' },
            { type: 'narration', html: "<span class='highlight' style='font-size:4rem; margin-top:20px; display:inline-block;'>The Confession.</span>", effect: 'end' }
        ];

        let currentIndex = 0;
        let isAnimating = false;
        const container = document.getElementById('story-container');
        const instruction = document.getElementById('instruction');

        function showNextLine() {
            if (currentIndex >= storyLines.length || isAnimating) return;
            isAnimating = true;

            const lineData = storyLines[currentIndex];

            const existingLines = container.querySelectorAll('.story-item');
            existingLines.forEach(line => {
                let lvl = parseInt(line.getAttribute('data-level') || 0);
                lvl++;
                line.setAttribute('data-level', lvl);
                line.className = `story-item level-${lvl}`;
            });

            const el = document.createElement('div');
            el.className = 'story-item active';
            el.setAttribute('data-level', '0');
            
            if (lineData.type === 'chat') {
                el.innerHTML = lineData.html;
                container.appendChild(el);
                setTimeout(() => { isAnimating = false; }, 1200);
            } else {
                el.innerHTML = `<div class="narration">${lineData.html}</div>`;
                container.appendChild(el);

                const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
                const textNodes = [];
                let node;
                while(node = walker.nextNode()) {
                    if(node.nodeValue.trim() !== '') textNodes.push(node);
                }
                
                let wordIndex = 0;
                textNodes.forEach(textNode => {
                    const text = textNode.nodeValue;
                    const fragment = document.createDocumentFragment();
                    const words = text.split(/(\s+)/); 
                    words.forEach(w => {
                        if (w.match(/^\s+$/)) {
                            fragment.appendChild(document.createTextNode(w));
                        } else if(w.length > 0) {
                            const span = document.createElement('span');
                            span.className = 'anim-word';
                            span.innerHTML = w;
                            span.style.animationDelay = (wordIndex * 150) + 'ms';
                            fragment.appendChild(span);
                            wordIndex++;
                        }
                    });
                    textNode.parentNode.replaceChild(fragment, textNode);
                });

                setTimeout(() => { isAnimating = false; }, (wordIndex * 150) + 600);
            }

            if (lineData.effect === 'bro') triggerEmojiBurst(['🙄', '😂', '🤦‍♂️'], 8);
            if (lineData.effect === 'confess') triggerEmojiBurst(['❤️', '🥺', '💖', '💘', '💗'], 25);
            if (lineData.effect === 'morning') {
                document.body.classList.add('morning-mode');
                triggerEmojiBurst(['🌅', '☀️', '✨'], 8);
            }
            if (lineData.effect === 'knock') {
                document.getElementById('flash').setAttribute('style', 'animation: flashWhite 0.2s');
                setTimeout(()=>document.getElementById('flash').removeAttribute('style'), 250);
            }
            if (lineData.effect === 'window') {
                document.getElementById('flash').setAttribute('style', 'animation: flashWhite 0.8s');
                triggerEmojiBurst(['🍀', '🌟', '🥰', '📝'], 25);
                setTimeout(()=>document.getElementById('flash').removeAttribute('style'), 850);
            }
            if (lineData.effect === 'end') addNextChapterLink();

            currentIndex++;
            if (currentIndex >= storyLines.length) {
                instruction.innerText = "The best of luck... 🍀";
                instruction.style.animation = "none";
                instruction.style.opacity = "1";
            }
        }

        document.body.addEventListener('click', (e) => {
            if (e.target.closest('a')) return;
            createRipple(e.clientX, e.clientY);
            showNextLine();
        });

        setTimeout(showNextLine, 1000);

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '10px';
            ripple.style.height = '10px';
            ripple.style.background = 'rgba(255,255,255,0.7)';
            if(document.body.classList.contains('morning-mode')) ripple.style.background = 'rgba(0,0,0,0.2)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'rippleOut 0.8s ease-out forwards';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 800);
        }

        const rippleStyle = document.createElement('style');
        rippleStyle.innerHTML = `@keyframes rippleOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(20); opacity: 0; } }`;
        document.head.appendChild(rippleStyle);

        function triggerEmojiBurst(icons, count) {
            for(let i=0; i<count; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'floating-emoji';
                    emoji.innerText = icons[Math.floor(Math.random() * icons.length)];
                    emoji.style.left = (window.innerWidth / 2) + 'px';
                    emoji.style.top = (window.innerHeight - 50) + 'px';
                    emoji.style.setProperty('--randX', ((Math.random() - 0.5) * 600) + 'px');
                    emoji.style.setProperty('--randRot', ((Math.random() - 0.5) * 360) + 'deg');
                    emoji.style.animation = 'floatUpEmoji 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards';
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 3000);
                }, i * (1500/count));
            }
        }

        function addNextChapterLink() {
            setTimeout(() => {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'story-item active';
                linkContainer.setAttribute('data-level', '0');
                linkContainer.style.marginTop = "40px";
                linkContainer.style.textAlign = "center";
                linkContainer.style.width = "100%";
                
                const nextBtn = document.createElement('a');
                nextBtn.href = "2023_moment16.html";
                nextBtn.innerHTML = "Continue the Story →";
                nextBtn.style.display = "inline-block";
                nextBtn.style.padding = "20px 40px";
                nextBtn.style.background = "linear-gradient(45deg, #000, #333)";
                nextBtn.style.color = "#89f7fe";
                nextBtn.style.textDecoration = "none";
                nextBtn.style.borderRadius = "50px";
                nextBtn.style.fontFamily = "'Montserrat', sans-serif";
                nextBtn.style.fontWeight = "bold";
                nextBtn.style.fontSize = "1.4rem";
                nextBtn.style.boxShadow = "0 10px 30px rgba(0, 0, 0, 0.4)";
                nextBtn.style.transition = "all 0.3s";
                nextBtn.style.border = "1px solid rgba(0,0,0,0.2)";
                nextBtn.style.animation = "pulseText 2s infinite";
                nextBtn.style.pointerEvents = "auto";
                
                nextBtn.onmouseover = () => { nextBtn.style.transform = "scale(1.1)"; nextBtn.style.color = "#fff"; };
                nextBtn.onmouseout = () => { nextBtn.style.transform = "scale(1)"; nextBtn.style.color = "#89f7fe"; };

                linkContainer.appendChild(nextBtn);
                container.appendChild(linkContainer);
                
                const existingLines = container.querySelectorAll('.story-item:not(:last-child)');
                existingLines.forEach(line => {
                    let lvl = parseInt(line.getAttribute('data-level') || 0);
                    lvl++;
                    line.setAttribute('data-level', lvl);
                    line.className = `story-item level-${lvl}`;
                });
                
                instruction.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
