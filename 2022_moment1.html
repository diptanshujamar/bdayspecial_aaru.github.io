<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 1: The Initiation</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e130c, #9a8478); /* Deep aesthetic background */
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Hide scrollbar for immersive experience */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ambient floating particles */
        .ambient-particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: floatAmbient 10s infinite linear;
        }

        @keyframes floatAmbient {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .instruction {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
            animation: pulseText 2s infinite;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .story-container {
            width: 90%;
            max-width: 800px;
            height: 70vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* New lines pop in at the bottom */
            align-items: center;
            z-index: 10;
        }

        .story-item {
            position: absolute;
            width: 100%;
            text-align: center;
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); /* Bouncy spring effect */
            will-change: transform, opacity;
        }

        /* Different visual styles for lines */
        .narration {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            line-height: 1.5;
            color: #f8f8f8;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .highlight {
            font-family: 'Dancing Script', cursive;
            color: #ffafbd;
            font-size: 2.8rem;
            text-shadow: 0 0 20px rgba(255, 175, 189, 0.6);
        }

        .chat-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .chat-bubble {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            font-weight: 500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: inline-block;
            position: relative;
        }

        .chat-bubble.me {
            background: rgba(161, 196, 253, 0.2);
            border-color: rgba(161, 196, 253, 0.4);
            border-bottom-right-radius: 5px;
        }

        .chat-bubble.kaukab {
            background: rgba(253, 227, 167, 0.2);
            border-color: rgba(253, 227, 167, 0.4);
            border-bottom-left-radius: 5px;
        }

        .chat-bubble.her {
            background: rgba(255, 175, 189, 0.3);
            border-color: #ffafbd;
            border-bottom-left-radius: 5px;
            font-weight: 600;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 175, 189, 0.5);
            transform-origin: center bottom;
            animation: heartbeat 2s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            10% { transform: scale(1.05); }
            20% { transform: scale(1); }
            30% { transform: scale(1.05); }
            40% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        .speaker-name {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ddd;
        }

        /* Active state for the newest line */
        .story-item.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Move older lines up and fade them to create history effect */
        .story-item.level-1 { transform: translateY(-140px) scale(0.95); opacity: 0.8; }
        .story-item.level-2 { transform: translateY(-280px) scale(0.9); opacity: 0.5; }
        .story-item.level-3 { transform: translateY(-420px) scale(0.8); opacity: 0.2; }
        .story-item.level-4 { transform: translateY(-560px) scale(0.7); opacity: 0; display: none; }

        /* Scrambled Flying Text Effects */
        .anim-char {
            display: inline-block;
            opacity: 0;
            transform: translate(var(--tx), var(--ty)) scale(3) rotate(var(--rot));
            transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1s ease, filter 1s ease;
            filter: blur(10px);
        }

        .anim-char.flying-in {
            opacity: 1;
            transform: translate(0, 0) scale(1) rotate(0deg);
            filter: blur(0px);
        }

        .anim-char.settled {
            color: inherit;
            animation: textFlash 0.5s ease forwards;
        }

        @keyframes textFlash {
            0% { text-shadow: 0 0 20px #fff, 0 0 30px #ffafbd; color: #fff; }
            100% { text-shadow: inherit; }
        }

        /* Dramatic Effects */
        .sparkle-burst {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px #ffafbd;
            pointer-events: none;
            animation: burstOut 1s ease-out forwards;
        }

        @keyframes burstOut {
            0% { transform: scale(0) translate(0, 0); opacity: 1; }
            100% { transform: scale(1.5) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        .giant-heart {
            position: absolute;
            font-size: 5rem;
            pointer-events: none;
            animation: floatHeart 4s ease-out forwards;
            z-index: 9999;
        }

        @keyframes floatHeart {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            20% { transform: translate(-50%, -50%) scale(1.2) rotate(-10deg); opacity: 1; }
            100% { transform: translate(-50%, -150vh) scale(2) rotate(20deg); opacity: 0; }
        }

        @keyframes fallPetal {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 1; }
            25% { transform: translateY(25vh) rotate(90deg) translateX(30px); opacity: 0.9; }
            50% { transform: translateY(50vh) rotate(180deg) translateX(-30px); opacity: 0.8; }
            75% { transform: translateY(75vh) rotate(270deg) translateX(30px); opacity: 0.5; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(-30px); opacity: 0; }
        }

        @keyframes glowRomantic {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes pulseRomantic {
            0% { box-shadow: inset 0 0 50px rgba(255, 0, 100, 0.2); }
            100% { box-shadow: inset 0 0 150px rgba(255, 0, 100, 0.6); }
        }

        .btn-back {
            position: absolute;
            top: 30px;
            left: 30px;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            font-weight: 500;
            transition: all 0.3s;
            z-index: 100;
        }

        .btn-back:hover {
            background: #ffafbd;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 175, 189, 0.6);
            border-color: transparent;
        }
    </style>
    <style>
        #page-entrance-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; z-index: 9999999; animation: fadeOutWhite 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        @keyframes fadeOutWhite { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
    </style>
</head>
<body>
    <div id="page-entrance-overlay"></div>

    <a href="2022_details.html" class="btn-back">← Back to Moments</a>

    <div class="story-container" id="story-container">
        <!-- Lines injected here by JS -->
    </div>

    <div class="instruction" id="instruction">Tap anywhere to reveal...</div>

    <script>
        // Story Data Structure strictly incorporating user's details
        const storyLines = [
            { type: 'narration', html: "The examination had just finished... 📝" },
            { type: 'narration', html: "We were all sitting out there on the benches." },
            { type: 'narration', html: "And you... you were sitting on the very next bench, with <span class='highlight'>Kaukab</span>." },
            { type: 'narration', html: "I turned my head and looked over..." },
            { type: 'narration', html: "It was the first time I saw a person looking so absolutely <span class='highlight'>magnificent</span>. ✨", effect: 'sparkle' },
            { type: 'narration', html: "It was mesmerizing to see a beauty like you. 💖" },
            { type: 'narration', html: "I turned around and,to keep it casual, I first asked Kaukab..." },
            { type: 'chat', speaker: 'Me', cls: 'me', text: "How was your paper?" },
            { type: 'chat', speaker: 'Kaukab', cls: 'kaukab', text: "It was good!" },
            { type: 'narration', html: "But then... I finally came to you. 💓" },
            { type: 'chat', speaker: 'Me', cls: 'me', text: "And how was your paper?" },
            { type: 'narration', html: "You looked at me, and replied..." },
            { type: 'chat', speaker: 'You ❤️', cls: 'her', text: "It was okie okie.", effect: 'hearts' },
            { type: 'narration', html: "And right there, on those benches, after the exams..." },
            { type: 'narration', html: "Our very first conversation happened. <br><span class='highlight'>The Beginning.</span>", effect: 'finale' },
            { type: 'narration', html: "Yeah, that first talk was great... 💭" },
            { type: 'narration', html: "But it wasn't enough to be a friend." },
            { type: 'narration', html: "I wanted to talk more, but I was unable to gain the courage." },
            { type: 'narration', html: "Lets goo on the next moment <span class='highlight'>Attraction</span> with you! 😉", effect: 'nextChapter' }
        ];

        let currentIndex = 0;
        const container = document.getElementById('story-container');
        const instruction = document.getElementById('instruction');

        // Create background ambient particles
        for(let i=0; i<30; i++) {
            let p = document.createElement('div');
            p.className = 'ambient-particle';
            let size = Math.random() * 5 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.animationDuration = (10 + Math.random() * 15) + 's';
            document.body.appendChild(p);
        }

        function showNextLine() {
            if (currentIndex >= storyLines.length) return;

            const lineData = storyLines[currentIndex];

            // Shift existing lines upwards
            const existingLines = document.querySelectorAll('.story-item');
            existingLines.forEach(line => {
                let lvl = parseInt(line.getAttribute('data-level') || 0);
                lvl++;
                line.setAttribute('data-level', lvl);
                line.className = `story-item level-${lvl}`;
            });

            // Create new text/chat element
            const el = document.createElement('div');
            el.className = 'story-item active';
            el.setAttribute('data-level', '0');

            if (lineData.type === 'narration') {
                el.innerHTML = `<div class="narration">${lineData.html}</div>`;
            } else if (lineData.type === 'chat') {
                el.innerHTML = `
                    <div class="chat-row">
                        <div class="speaker-name">${lineData.speaker}</div>
                        <div class="chat-bubble ${lineData.cls}">${lineData.text}</div>
                    </div>
                `;
            }

            container.appendChild(el);

            // Execute the letter flying & scrambling animation
            animateTextContent(el);

            // Trigger visual magical effects
            if (lineData.effect === 'sparkle') triggerSparkles();
            if (lineData.effect === 'hearts') triggerHearts();
            if (lineData.effect === 'finale') triggerFinale();
            if (lineData.effect === 'nextChapter') triggerNextChapter();

            currentIndex++;

            if (currentIndex >= storyLines.length) {
                instruction.innerText = "And the rest is history... ❤️";
                instruction.style.animation = "none";
                instruction.style.opacity = "1";
            }
        }

        function animateTextContent(containerDiv) {
            const walker = document.createTreeWalker(containerDiv, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            let node;
            while(node = walker.nextNode()) {
                if(node.nodeValue.trim() !== '') {
                    textNodes.push(node);
                }
            }

            textNodes.forEach(textNode => {
                const text = textNode.nodeValue;
                const fragment = document.createDocumentFragment();
                const textArr = [...text]; // Safe for emojis
                
                for (let i = 0; i < textArr.length; i++) {
                    const char = textArr[i];
                    if (char === ' ') {
                        fragment.appendChild(document.createTextNode(' '));
                        continue;
                    }
                    const span = document.createElement('span');
                    span.className = 'anim-char';
                    span.textContent = char;
                    span.dataset.char = char;
                    
                    const angle = Math.random() * Math.PI * 2;
                    const distance = Math.random() * window.innerWidth/1.5 + 50;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance;
                    const rot = (Math.random() - 0.5) * 360;
                    
                    span.style.setProperty('--tx', tx + 'px');
                    span.style.setProperty('--ty', ty + 'px');
                    span.style.setProperty('--rot', rot + 'deg');
                    span.style.setProperty('--delay', (Math.random() * 0.5) + 's');
                    
                    fragment.appendChild(span);
                }
                textNode.parentNode.replaceChild(fragment, textNode);
            });

            const chars = containerDiv.querySelectorAll('.anim-char');
            
            chars.forEach(span => {
                const delayMs = parseFloat(span.style.getPropertyValue('--delay')) * 1000;
                
                setTimeout(() => {
                    span.classList.add('flying-in');
                    
                    setTimeout(() => { span.classList.add('settled'); }, 1500);
                }, delayMs);
            });
        }

        document.body.addEventListener('click', (e) => {
            if (e.target.closest('.btn-back')) return; // Allow the back button link to work naturally
            
            if (currentIndex < storyLines.length) {
                // Click ripple to make tapping interactive
                createRipple(e.clientX, e.clientY);
                showNextLine();
            }
        });

        // Initialize first line
        setTimeout(() => {
            showNextLine();
        }, 500);

        // --- Extravagant Effects Functions --- //

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.className = 'sparkle-burst';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.background = '#fff';
            document.body.appendChild(ripple);
            
            // random direction scattering
            const tx = (Math.random() - 0.5) * 100 + 'px';
            const ty = (Math.random() - 0.5) * 100 + 'px';
            ripple.style.setProperty('--tx', tx);
            ripple.style.setProperty('--ty', ty);
            
            setTimeout(() => ripple.remove(), 1000);
        }

        function triggerSparkles() {
            for(let i=0; i<40; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.className = 'sparkle-burst';
                    spark.style.left = Math.random() * window.innerWidth + 'px';
                    spark.style.top = Math.random() * window.innerHeight + 'px';
                    
                    const tx = (Math.random() - 0.5) * 200 + 'px';
                    const ty = (Math.random() - 0.5) * 200 + 'px';
                    spark.style.setProperty('--tx', tx);
                    spark.style.setProperty('--ty', ty);
                    
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 1000);
                }, i * 30);
            }
        }

        function triggerHearts() {
            // Giant hearts float up when she says 'okie okie'
            for(let i=0; i<30; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'giant-heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 200) + 'px';
                    heart.style.top = (window.innerHeight) + 'px'; // Start from bottom of screen
                    
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 4000);
                }, i * 100);
            }
        }

        function triggerFinale() {
            triggerSparkles();
            triggerHearts();
            
            // Completely change the scenario to romantic!
            document.body.style.background = 'radial-gradient(circle at center, #ff0844 0%, #ffb199 100%)';
            document.body.style.transition = 'background 3s ease';
            document.body.style.animation = 'pulseRomantic 4s infinite alternate';
            
            // Add a warm romantic glow
            const overlay = document.createElement('div');
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100vw';
            overlay.style.height = '100vh';
            overlay.style.background = 'rgba(255, 105, 135, 0.2)';
            overlay.style.pointerEvents = 'none';
            overlay.style.zIndex = '1';
            overlay.style.animation = 'glowRomantic 3s ease-in forwards';
            document.body.appendChild(overlay);

            startRosePetals();
        }

        function startRosePetals() {
            // Fade out the old subtle ambient particles
            document.querySelectorAll('.ambient-particle').forEach(p => p.style.opacity = '0');
            
            // Create falling rose petals continuously
            setInterval(() => {
                const petal = document.createElement('div');
                const petalIcons = ['🌹', '❤️', '🏵️']; // Mix of romantic symbols
                petal.innerHTML = petalIcons[Math.floor(Math.random() * petalIcons.length)];
                petal.style.position = 'absolute';
                petal.style.fontSize = (15 + Math.random() * 20) + 'px';
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = '-50px';
                petal.style.opacity = '0.8';
                petal.style.zIndex = '5';
                petal.style.pointerEvents = 'none';
                petal.style.animation = `fallPetal ${5 + Math.random() * 5}s linear forwards`;
                document.body.appendChild(petal);
                
                setTimeout(() => petal.remove(), 10000);
            }, 300);
        }

        function triggerNextChapter() {
            setTimeout(() => {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'story-item active';
                linkContainer.setAttribute('data-level', '0');
                linkContainer.style.marginTop = "40px";
                linkContainer.style.textAlign = "center";
                linkContainer.style.width = "100%";
                
                const nextBtn = document.createElement('a');
                nextBtn.href = "2022_moment2.html";
                nextBtn.innerHTML = "Do you want to move to the next chapter? →";
                nextBtn.style.display = "inline-block";
                nextBtn.style.padding = "20px 40px";
                nextBtn.style.background = "linear-gradient(45deg, #ff9a9e, #ffafbd)";
                nextBtn.style.color = "white";
                nextBtn.style.textDecoration = "none";
                nextBtn.style.borderRadius = "50px";
                nextBtn.style.fontFamily = "'Montserrat', sans-serif";
                nextBtn.style.fontWeight = "600";
                nextBtn.style.fontSize = "1.3rem";
                nextBtn.style.boxShadow = "0 10px 30px rgba(255, 175, 189, 0.5)";
                nextBtn.style.transition = "all 0.3s cubic-bezier(0.25, 1.5, 0.5, 1)";
                nextBtn.style.animation = "heartbeat 2s infinite";
                nextBtn.style.pointerEvents = "auto";
                
                nextBtn.onmouseover = () => { nextBtn.style.transform = "scale(1.1)"; };
                nextBtn.onmouseout = () => { nextBtn.style.transform = "scale(1)"; };

                linkContainer.appendChild(nextBtn);
                document.getElementById('story-container').appendChild(linkContainer);
                
                // Shift existing
                const existingLines = document.querySelectorAll('.story-item:not(:last-child)');
                existingLines.forEach(line => {
                    let lvl = parseInt(line.getAttribute('data-level') || 0);
                    lvl++;
                    line.setAttribute('data-level', lvl);
                    line.className = `story-item level-${lvl}`;
                });
            }, 1000);
        }

    </script>
</body>
</html>
