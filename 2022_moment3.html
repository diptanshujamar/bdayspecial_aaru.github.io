<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 3: Apart in the Class</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; min-height: 100vh; overflow: hidden; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* The page entrance transition */
        #page-entrance-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #ffffff; z-index: 9999999; animation: fadeOutWhite 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; pointer-events: none; }
        @keyframes fadeOutWhite { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* Distance visual: Two glowing orbs separated */
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; z-index: 0; animation: floatOrb 10s infinite alternate ease-in-out; pointer-events: none; }
        .orb-left { top: 20%; left: -5%; width: 40vw; height: 40vw; background: #3498db; }
        .orb-right { bottom: 20%; right: -5%; width: 40vw; height: 40vw; background: #e74c3c; animation-delay: -5s; }
        @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(50px, 50px) scale(1.2); } }

        .story-container { width: 90%; max-width: 800px; height: 75vh; position: relative; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 10; perspective: 1000px; }
        .story-item { position: absolute; width: 100%; text-align: center; opacity: 0; transform: translateY(50px) scale(0.9); transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); will-change: transform, opacity; }
        
        .story-item.active { opacity: 1; transform: translateY(0) scale(1); }
        .story-item.level-1 { transform: translateY(-140px) scale(0.95); opacity: 0.7; filter: blur(0px); }
        .story-item.level-2 { transform: translateY(-280px) scale(0.9); opacity: 0.4; filter: blur(2px); }
        .story-item.level-3 { transform: translateY(-420px) scale(0.8); opacity: 0.1; filter: blur(4px); }
        .story-item.level-4 { transform: translateY(-560px) scale(0.7); opacity: 0; display: none; }

        .narration { font-family: 'Playfair Display', serif; font-size: 1.8rem; line-height: 1.6; color: #f8f8f8; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .highlight { font-family: 'Dancing Script', cursive; color: #ff9a9e; font-size: 2.8rem; text-shadow: 0 0 20px rgba(255, 154, 158, 0.8); }

        .instruction { position: absolute; bottom: 40px; font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.6); animation: pulseText 2s infinite; pointer-events: none; z-index: 1000; }
        @keyframes pulseText { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.05); } }

        .btn-back { position: absolute; top: 30px; left: 30px; padding: 10px 25px; background: rgba(255, 255, 255, 0.1); color: white; text-decoration: none; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); font-weight: 500; transition: all 0.3s; z-index: 100; }
        .btn-back:hover { background: #3498db; transform: scale(1.05); box-shadow: 0 0 20px rgba(52, 152, 219, 0.6); border-color: transparent; }

        /* Effects Overlays */
        .spotlight-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 70%); opacity: 0; pointer-events: none; z-index: 5; transition: opacity 1.5s ease; }
        body.spotlight-active .spotlight-overlay { opacity: 1; }

        .fire-glow { position: fixed; bottom: 0; left: 0; width: 100vw; height: 50vh; background: radial-gradient(ellipse at bottom, rgba(255,87,34,0.4) 0%, transparent 70%); opacity: 0; pointer-events: none; z-index: 1; transition: opacity 2s ease; }
        body.fire-active .fire-glow { opacity: 1; }

        .floating-emoji { position: absolute; font-size: 3rem; pointer-events: none; z-index: 9999; }
        
        @keyframes floatUpEmoji { 0% { transform: translate(-50%, 0) scale(0); opacity: 1; } 100% { transform: translate(calc(-50% + var(--randX)), -50vh) scale(1.5); opacity: 0; } }

        /* Direct text fade-in with slide */
        .anim-word { display: inline-block; opacity: 0; transform: translateY(20px); filter: blur(5px); animation: wordSlideUp 0.6s cubic-bezier(0.2,0.8,0.2,1) forwards; }
        @keyframes wordSlideUp { to { opacity: 1; transform: translateY(0); filter: blur(0); } }
    </style>
</head>
<body>
    <div id="page-entrance-overlay"></div>
    <div class="spotlight-overlay" id="spotlight"></div>
    <div class="fire-glow" id="fire"></div>

    <!-- Distance orbs acting as ambient aesthetics -->
    <div class="orb orb-left"></div>
    <div class="orb orb-right"></div>

    <a href="2022_details.html" class="btn-back">← Back to Moments</a>

    <div class="story-container" id="story-container"></div>
    <div class="instruction" id="instruction">Tap anywhere to reveal...</div>

    <script>
        const storyLines = [
            { type: 'narration', html: "We were still barely talking to each other at that time... 😶" },
            { type: 'narration', html: "But I couldn't just sit there. I was constantly finding ways to talk to you." },
            { type: 'narration', html: "I would pick up the things you mistakenly left in the class just to hand them back." },
            { type: 'narration', html: "Or I would ask you for help with things I already knew... for absolutely no reason at all. 😅", effect: 'chuckle' },
            { type: 'narration', html: "I thought maybe we could finally start talking more about things..." },
            { type: 'narration', html: "But then, the teacher noticed. 👩‍🏫" },
            { type: 'narration', html: "She took us apart... sending me to the <span class='highlight' style='color:#e74c3c'>very opposite side</span> of the class." },
            { type: 'narration', html: "That was such a bad thing. Things didn't work out the way I had planned. 💔", effect: 'break' },
            { type: 'narration', html: "But honestly?" },
            { type: 'narration', html: "That distance only made me more passionate. 🔥", effect: 'fire' },
            { type: 'narration', html: "I became determined to steal every single glance of yours that I could possibly get. 👀✨", effect: 'glance' },
            { type: 'narration', html: "<span class='highlight' style='font-size:3.5rem; margin-top:20px; display:inline-block;'>To be continued...</span>", effect: 'end' }
        ];

        let currentIndex = 0;
        let isAnimating = false;
        const container = document.getElementById('story-container');
        const instruction = document.getElementById('instruction');

        function showNextLine() {
            if (currentIndex >= storyLines.length || isAnimating) return;
            isAnimating = true;

            const lineData = storyLines[currentIndex];

            // Shift existing
            const existingLines = container.querySelectorAll('.story-item');
            existingLines.forEach(line => {
                let lvl = parseInt(line.getAttribute('data-level') || 0);
                lvl++;
                line.setAttribute('data-level', lvl);
                line.className = `story-item level-${lvl}`;
            });

            // Create new
            const el = document.createElement('div');
            el.className = 'story-item active';
            el.setAttribute('data-level', '0');
            el.innerHTML = `<div class="narration">${lineData.html}</div>`;
            container.appendChild(el);

            // Animate words sliding directly in
            const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            let node;
            while(node = walker.nextNode()) {
                if(node.nodeValue.trim() !== '') textNodes.push(node);
            }
            
            let wordIndex = 0;
            textNodes.forEach(textNode => {
                const text = textNode.nodeValue;
                const fragment = document.createDocumentFragment();
                const words = text.split(/(\s+)/); 
                words.forEach(w => {
                    if (w.match(/^\s+$/)) {
                        fragment.appendChild(document.createTextNode(w));
                    } else if(w.length > 0) {
                        const span = document.createElement('span');
                        span.className = 'anim-word';
                        span.innerHTML = w;
                        span.style.animationDelay = (wordIndex * 130) + 'ms';
                        fragment.appendChild(span);
                        wordIndex++;
                    }
                });
                textNode.parentNode.replaceChild(fragment, textNode);
            });

            setTimeout(() => { isAnimating = false; }, (wordIndex * 130) + 600);

            // Effects
            if (lineData.effect === 'chuckle') triggerChuckle();
            if (lineData.effect === 'break') triggerBreak();
            if (lineData.effect === 'fire') triggerFire();
            if (lineData.effect === 'glance') triggerGlance();
            if (lineData.effect === 'end') addNextChapterLink();

            currentIndex++;
            if (currentIndex >= storyLines.length) {
                instruction.innerText = "Distance only fueled the fire... ❤️";
                instruction.style.animation = "none";
                instruction.style.opacity = "1";
            }
        }

        // Tapping advances the story
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('a')) return;
            createRipple(e.clientX, e.clientY);
            showNextLine();
        });

        setTimeout(showNextLine, 1500);

        function createRipple(x, y) {
            const ripple = document.createElement('div');
            ripple.style.position = 'absolute';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '10px';
            ripple.style.height = '10px';
            ripple.style.background = 'rgba(255,255,255,0.8)';
            ripple.style.borderRadius = '50%';
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'rippleOut 0.6s ease-out forwards';
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        const rippleStyle = document.createElement('style');
        rippleStyle.innerHTML = `@keyframes rippleOut { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(10); opacity: 0; } }`;
        document.head.appendChild(rippleStyle);

        function triggerChuckle() {
            for(let i=0; i<8; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'floating-emoji';
                    const icons = ['😅', '🙈', '🤭'];
                    emoji.innerText = icons[Math.floor(Math.random() * icons.length)];
                    emoji.style.left = (window.innerWidth / 2) + 'px';
                    emoji.style.top = (window.innerHeight - 100) + 'px';
                    emoji.style.setProperty('--randX', ((Math.random() - 0.5) * 400) + 'px');
                    emoji.style.animation = 'floatUpEmoji 3s ease-in forwards';
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 3000);
                }, i * 150);
            }
        }

        function triggerBreak() {
            document.body.style.transition = 'background 0.1s';
            document.body.style.background = '#1a1a1a';
            setTimeout(() => {
                document.body.style.transition = 'background 2s ease';
                document.body.style.background = ''; 
            }, 300);

            for(let i=0; i<5; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'floating-emoji';
                    emoji.innerText = '💔';
                    emoji.style.left = (window.innerWidth / 2) + 'px';
                    emoji.style.top = (window.innerHeight - 200) + 'px';
                    emoji.style.setProperty('--randX', ((Math.random() - 0.5) * 200) + 'px');
                    emoji.style.animation = 'floatDown 3s ease-in forwards';
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 3000);
                }, i * 300);
            }
        }

        const downStyle = document.createElement('style');
        downStyle.innerHTML = `@keyframes floatDown { 0% { transform: translate(-50%, 0) scale(1.5); opacity: 1; filter:blur(0px); } 100% { transform: translate(calc(-50% + var(--randX)), 50vh) scale(0.8); opacity: 0; filter:blur(10px); } }`;
        document.head.appendChild(downStyle);

        function triggerFire() {
            document.body.classList.add('fire-active');
            for(let i=0; i<20; i++) {
                setTimeout(() => {
                    const emoji = document.createElement('div');
                    emoji.className = 'floating-emoji';
                    emoji.innerText = '🔥';
                    emoji.style.left = (Math.random() * window.innerWidth) + 'px';
                    emoji.style.top = (window.innerHeight + 50) + 'px';
                    emoji.style.setProperty('--randX', ((Math.random() - 0.5) * 150) + 'px');
                    emoji.style.animation = 'floatUpEmoji 3s ease-in forwards';
                    document.body.appendChild(emoji);
                    setTimeout(() => emoji.remove(), 3000);
                }, i * 150);
            }
        }

        function triggerGlance() {
            document.body.classList.add('spotlight-active');
            
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.style.position = 'absolute';
                    spark.style.left = Math.random() * window.innerWidth + 'px';
                    spark.style.top = Math.random() * window.innerHeight + 'px';
                    spark.style.width = '10px';
                    spark.style.height = '10px';
                    spark.style.background = '#fff';
                    spark.style.borderRadius = '50%';
                    spark.style.boxShadow = '0 0 20px #fff, 0 0 40px #f1c40f';
                    spark.style.pointerEvents = 'none';
                    spark.style.animation = 'glanceSparkle 1.5s ease-in-out forwards';
                    document.body.appendChild(spark);
                    setTimeout(() => spark.remove(), 1500);
                }, i * 200);
            }
            
            // Add a giant set of animated eyes in the background momentarily
            setTimeout(() => {
                const eyes = document.createElement('div');
                eyes.innerText = '👀';
                eyes.style.position = 'absolute';
                eyes.style.left = '50%';
                eyes.style.top = '25%';
                eyes.style.transform = 'translate(-50%, -50%) scale(10)';
                eyes.style.opacity = '0.05';
                eyes.style.pointerEvents = 'none';
                eyes.style.animation = 'glanceSparkle 3s ease-in-out forwards';
                document.body.appendChild(eyes);
                setTimeout(() => eyes.remove(), 3000);
            }, 500);
        }

        const sparkleStyle = document.createElement('style');
        sparkleStyle.innerHTML = `@keyframes glanceSparkle { 0% { transform: scale(0); opacity: 0; } 50% { transform: scale(2); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }`;
        document.head.appendChild(sparkleStyle);

        function addNextChapterLink() {
            setTimeout(() => {
                const linkContainer = document.createElement('div');
                linkContainer.className = 'story-item active';
                linkContainer.setAttribute('data-level', '0');
                linkContainer.style.marginTop = "40px";
                linkContainer.style.textAlign = "center";
                linkContainer.style.width = "100%";
                
                const nextBtn = document.createElement('a');
                nextBtn.href = "2022_moment4.html";
                nextBtn.innerHTML = "Continue the Story →";
                nextBtn.style.display = "inline-block";
                nextBtn.style.padding = "20px 40px";
                nextBtn.style.background = "linear-gradient(45deg, #1f4037, #99f2c8)";
                nextBtn.style.color = "#111";
                nextBtn.style.textDecoration = "none";
                nextBtn.style.borderRadius = "50px";
                nextBtn.style.fontFamily = "'Montserrat', sans-serif";
                nextBtn.style.fontWeight = "600";
                nextBtn.style.fontSize = "1.3rem";
                nextBtn.style.boxShadow = "0 10px 30px rgba(153, 242, 200, 0.4)";
                nextBtn.style.transition = "all 0.3s";
                nextBtn.style.animation = "pulseText 2s infinite";
                nextBtn.style.pointerEvents = "auto";
                
                nextBtn.onmouseover = () => { nextBtn.style.transform = "scale(1.1)"; };
                nextBtn.onmouseout = () => { nextBtn.style.transform = "scale(1)"; };

                linkContainer.appendChild(nextBtn);
                container.appendChild(linkContainer);
                
                const existingLines = container.querySelectorAll('.story-item:not(:last-child)');
                existingLines.forEach(line => {
                    let lvl = parseInt(line.getAttribute('data-level') || 0);
                    lvl++;
                    line.setAttribute('data-level', lvl);
                    line.className = `story-item level-${lvl}`;
                });
                
                instruction.style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
